<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>superM0D</title>
<style>
  @font-face { font-family: 'Street Reich'; src: url('assets/fonts/StreetReich.otf') format('opentype'); font-display: block; }
  @font-face { font-family: 'Ghost Theory'; src: url('assets/fonts/GhostTheory.ttf') format('truetype'); font-display: block; }
  @font-face { font-family: 'Arcade Normal'; src: url('assets/fonts/ARCADE_N.TTF') format('truetype'); font-display: block; }
  @font-face { font-family: 'Sell Your Soul'; src: url('assets/fonts/SellYourSoul.ttf') format('truetype'); font-display: block; }
  html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #ffffff; }
  @media (prefers-color-scheme: dark) { html, body { background: #0e1113; } }
  /* 100vh/vw don't track mobile browsers' address-bar show/hide, leaving a
     gap or cut-off edge; dvh/dvw do. vh/vw stay as the fallback for older
     WebViews that don't support dvh yet. */
  #game { width: 100vw; height: 100vh; width: 100dvw; height: 100dvh; cursor: none; touch-action: none; }
  /* Instant boot loader — pure CSS so it paints on the first frame, before
     Phaser, the fonts, or any art has downloaded. Removed once the title
     scene signals it is on screen (the 'nb-ready' event below). This is the
     "a loader would be better" fix: the long asset load now shows feedback
     instead of a blank/black screen. */
  #boot-loader { position: fixed; inset: 0; z-index: 99999; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    background: #0e1113; color: #d13b2e; font-family: 'Courier New', monospace;
    transition: opacity .45s ease; }
  #boot-loader .ring { width: 54px; height: 54px; border-radius: 50%;
    border: 5px solid rgba(209,59,46,.22); border-top-color: #d13b2e;
    animation: nb-spin .9s linear infinite; }
  #boot-loader .txt { margin-top: 18px; font-size: 14px; letter-spacing: 3px; opacity: .8; }
  #boot-loader.nb-hide { opacity: 0; pointer-events: none; }
  @keyframes nb-spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="boot-loader"><div class="ring"></div><div class="txt">LOADING&hellip;</div></div>
<script>
(function () {
  function hide() {
    var el = document.getElementById('boot-loader');
    if (!el) return;
    el.classList.add('nb-hide');
    setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 550);
  }
  window.addEventListener('nb-ready', hide, { once: true });
  // Safety net: never trap the player behind the loader if boot fails outright.
  setTimeout(hide, 30000);
})();
</script>
<div id="game"></div>
<script src="phaser.min.js"></script>
<script src="src/tunables.js"></script>
<script src="src/fonts.js"></script>
<script src="src/score.js"></script>
<script src="src/sfx.js"></script>
<script src="src/data-mock.js"></script>
<script src="src/reddit-theme.js"></script>
<script src="src/fakepage.js"></script>
<script src="src/wreckage.js"></script>
<script src="src/memes.js"></script>
<script src="src/moments.js"></script>
<script src="src/letters.js"></script>
<script src="src/pickups.js"></script>
<script src="src/projectiles.js"></script>
<script src="src/npc.js"></script>
<script src="src/baldur.js"></script>
<script src="src/boss.js"></script>
<script src="src/mod.js"></script>
<script src="src/title.js"></script>
<script src="src/main.js"></script>
</body>
</html>
